# Showcase 07: Three-Step Route (Buchwald, bromination, Suzuki)
# Three steps in one row

structures:
  aryl_br:
    smiles: "Brc1ccc2ccccc2n1"
    label: "1"
  morph:
    smiles: "C1COCCN1"
  coupled:
    smiles: "c1ccc2nc(N3CCOCC3)ccc2c1"
    label: "2"
  brominated:
    smiles: "Brc1cc2ccccc2nc1N1CCOCC1"
    label: "3"
  biaryl:
    smiles: "c1ccc(-c2cc3ccccc3nc2N2CCOCC2)cc1"
    label: "4"

steps:
  - substrates: [aryl_br]
    above_arrow:
      structures: [morph]
      text: ["(1.2 eq)"]
    below_arrow:
      text: ["Pd2(dba)3, BINAP", "Cs2CO3, dioxane", "reflux, 24 h"]
    products: [coupled]
    yield_: "72%"
  - substrates: [coupled]
    below_arrow:
      text: ["NBS (1.1 eq)", "DMF, 0 C, 2 h"]
    products: [brominated]
    yield_: "95%"
  - substrates: [brominated]
    below_arrow:
      text: ["PhB(OH)2, Pd(dppf)Cl2", "K2CO3, dioxane/H2O", "80 C, 16 h"]
    products: [biaryl]
    yield_: "85%"

layout: sequential
