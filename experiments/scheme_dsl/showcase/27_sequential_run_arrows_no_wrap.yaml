# Showcase 27: Sequential with Run Arrows (no wrapping)
# Two steps in one row with mass/yield tracking below

structures:
  sm:
    smiles: "Brc1ccc2ccccc2n1"
    label: "1"
  morph:
    smiles: "C1COCCN1"
  int:
    smiles: "c1ccc2nc(N3CCOCC3)ccc2c1"
    label: "2"
  product:
    smiles: "Brc1cc2ccccc2nc1N1CCOCC1"
    label: "3"

steps:
  - substrates: [sm]
    above_arrow:
      structures: [morph]
      text: ["(1.2 eq)"]
    below_arrow:
      text: ["Pd2(dba)3, BINAP", "Cs2CO3, dioxane, reflux"]
    products: [int]
  - substrates: [int]
    below_arrow:
      text: ["NBS (1.1 eq)", "DMF, 0 C, 2 h"]
    products: [product]

layout: sequential

run_arrows:
  - step: 1
    runs:
      - input: "2.15 g"
        output: "1.60 g, 72%"
  - step: 2
    runs:
      - input: "1.60 g"
        output: "1.52 g, 95%"
