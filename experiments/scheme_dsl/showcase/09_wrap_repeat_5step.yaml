# Showcase 09: Wrap:Repeat - 5 Steps in 2 Rows (3+2)
# Mimics Report-scheme-extr-2.cdx (the canonical multi-row example)

structures:
  sm:
    smiles: "Brc1ccc2ccccc2n1"
    label: "1"
  morph:
    smiles: "C1COCCN1"
  int1:
    smiles: "c1ccc2nc(N3CCOCC3)ccc2c1"
    label: "2"
  int2:
    smiles: "Brc1cc2ccccc2nc1N1CCOCC1"
    label: "3"
  int3:
    smiles: "c1ccc(-c2cc3ccccc3nc2N2CCOCC2)cc1"
    label: "4"
  int4:
    smiles: "O=Cc1c(-c2ccccc2)c2ccccc2nc1N1CCOCC1"
    label: "5"
  product:
    smiles: "OC(c1ccccc1)c1c(-c2ccccc2)c2ccccc2nc1N1CCOCC1"
    label: "6"

steps:
  - substrates: [sm]
    above_arrow:
      structures: [morph]
      text: ["(1.2 eq)"]
    below_arrow:
      text: ["Pd2(dba)3, BINAP", "Cs2CO3, dioxane, reflux"]
    products: [int1]
  - substrates: [int1]
    below_arrow:
      text: ["NBS, DMF, 0 C"]
    products: [int2]
  - substrates: [int2]
    below_arrow:
      text: ["PhB(OH)2, Pd(dppf)Cl2", "K2CO3, dioxane/H2O, 80 C"]
    products: [int3]
  - substrates: [int3]
    below_arrow:
      text: ["Cl2CHOCH3, TiCl4", "DCM, -78 C"]
    products: [int4]
  - substrates: [int4]
    below_arrow:
      text: ["PhMgBr (2 eq)", "THF, -78 C to RT"]
    products: [product]

layout: sequential
wrap: repeat
steps_per_row: 3
